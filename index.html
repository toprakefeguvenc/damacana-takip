<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Damacana Takip</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" id="themeMeta" content="#0e7c8a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Damacana">
<link rel="apple-touch-icon" href="icon.svg">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#f1f5f9;--srf:#ffffff;--srf2:#f8fafc;--txt:#0b1a2e;--txt2:#475569;--txt3:#94a3b8;--prm:#0e7c8a;--prm2:#0a5f6b;--prmglow:rgba(14,124,138,.12);--scs:#059669;--scl:#dc2626;--brd:#e2e8f0;--shw:0 2px 8px rgba(0,0,0,.04);--shwl:0 8px 32px rgba(0,0,0,.06);--rad:14px;--rads:10px;--bn:60px;--hd:50px;--fnt:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
[data-theme=dark]{--bg:#0b1120;--srf:#162033;--srf2:#1a2638;--txt:#e2eaf5;--txt2:#94a9c5;--txt3:#4d6380;--brd:rgba(255,255,255,.06);--prm:#3bc9c9;--prm2:#2bb0b0;--prmglow:rgba(59,201,201,.1);--scs:#34d399;--scl:#ef6b6b;--shw:0 2px 8px rgba(0,0,0,.2);--shwl:0 8px 32px rgba(0,0,0,.3)}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--fnt);background:var(--bg);color:var(--txt);min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;padding-bottom:calc(var(--bn) + 12px);padding-top:calc(var(--hd) + 8px);transition:background .3s}

/* Header */
.hdr{position:fixed;top:0;left:0;right:0;height:var(--hd);z-index:50;padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:var(--srf);border-bottom:1px solid var(--brd)}
.hdr-l{display:flex;align-items:center;gap:8px}
.hdr-l .logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--prm),var(--prm2));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-l .logo svg{color:#fff;width:18px;height:18px}
.hdr-l h1{font-size:.92rem;font-weight:700;letter-spacing:-.3px}
.hdr-l .hdr-date{font-size:.65rem;color:var(--txt3);display:block;margin-top:-1px}
.hdr-r{display:flex;align-items:center;gap:6px}
.hdr-r button{width:36px;height:36px;border:1px solid var(--brd);border-radius:10px;background:var(--srf);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:1rem;color:var(--txt2);flex-shrink:0}
.hdr-r button:hover{border-color:var(--prm);color:var(--prm)}

/* Pages */
.pg{display:none;padding:0 16px 20px;animation:pgIn .3s ease}
.pg.act{display:block}
.pg-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-top:4px}
.pg-hdr h2{font-size:1.15rem;font-weight:700;letter-spacing:-.3px}
.pg-hdr .ctrls{display:flex;gap:6px}
.pg-hdr .ctrls button{background:var(--srf2);border:1px solid var(--brd);border-radius:var(--rads);padding:7px 14px;cursor:pointer;font-size:.78rem;font-weight:500;color:var(--txt2);font-family:var(--fnt);transition:all .2s;display:flex;align-items:center;gap:4px;white-space:nowrap}
.pg-hdr .ctrls button:hover{border-color:var(--prm);color:var(--prm)}
@keyframes pgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Bottom Nav */
.bnav{position:fixed;bottom:0;left:0;right:0;height:var(--bn);z-index:50;background:var(--srf);border-top:1px solid var(--brd);display:flex;align-items:stretch;padding:4px 0 env(safe-area-inset-bottom,4px)}
.bnav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--txt3);text-decoration:none;font-size:.55rem;font-weight:600;transition:color .2s;cursor:pointer;letter-spacing:.1px;border:none;background:none;font-family:var(--fnt)}
.bnav a svg{width:22px;height:22px;transition:color .2s}
.bnav a.act{color:var(--prm)}
.bnav a.act svg{color:var(--prm)}

/* Cards */
.crds{display:flex;flex-direction:column;gap:12px;margin-bottom:14px}
.crd{background:var(--srf);border:1px solid var(--brd);border-radius:var(--rad);padding:16px 18px;transition:box-shadow .2s}
.crd .crd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.crd .crd-icn{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem}
.crd .crd-lbl{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--txt3)}
.crd .crd-val{font-size:1.65rem;font-weight:800;letter-spacing:-.5px;line-height:1.1}
.crd .crd-sub{font-size:.75rem;color:var(--txt2);margin-top:3px}
.crd.scs .crd-icn{background:linear-gradient(135deg,var(--prm),var(--prm2));color:#fff}
.crd.scs .crd-val{color:var(--scs)}

/* Tables */
.tbl{background:var(--srf);border:1px solid var(--brd);border-radius:var(--rad);overflow:hidden}
.tbl .tbl-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--brd);flex-wrap:wrap;gap:6px}
.tbl .tbl-hdr h3{font-size:.88rem;font-weight:600}
.tbl-scrl{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:480px}
th,td{padding:10px 14px;text-align:left;font-size:.8rem;border-bottom:1px solid var(--brd);white-space:nowrap}
th{font-weight:600;color:var(--txt3);font-size:.68rem;text-transform:uppercase;letter-spacing:.4px;background:var(--srf2)}
tr:last-child td{border-bottom:none}
tr:active td{background:var(--prmglow)}
td:last-child{text-align:right}th:last-child{text-align:right}
.tac{text-align:center!important}
.tar{text-align:right!important}
.t-scs{color:var(--scs);font-weight:600}
.t-mut{color:var(--txt3);font-weight:400}
td .acts{display:flex;gap:4px;justify-content:flex-end}
td .acts button{width:32px;height:32px;border:1px solid var(--brd);border-radius:8px;background:var(--srf);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .2s;color:var(--txt2)}
td .acts button:active{background:var(--prmglow);border-color:var(--prm);color:var(--prm)}

/* Chart */
.chrt{border:1px solid var(--brd);border-radius:var(--rad);padding:18px 16px;background:var(--srf);margin-top:12px}
.chrt h3{font-size:.88rem;font-weight:600;margin-bottom:14px}
.chrt-b{display:flex;align-items:flex-end;gap:4px;height:150px;padding:16px 0 22px}
.chrt-b .bar{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;position:relative;min-height:6px;border-radius:3px 3px 0 0;background:linear-gradient(180deg,var(--prm),var(--prm2))}
.chrt-b .bar .bv{position:absolute;top:-16px;font-size:.6rem;font-weight:700;color:var(--txt2);white-space:nowrap}
.chrt-b .bar .bl{position:absolute;bottom:-19px;font-size:.6rem;color:var(--txt3);white-space:nowrap;font-weight:500}
.chrt-b .bar.emp{background:var(--brd);min-height:6px}
.chrt-b .bar.emp .bl{bottom:-19px}
.chrt-b .bar.emp .bv{display:none}

/* Form */
.frm{background:var(--srf);border:1px solid var(--brd);border-radius:var(--rad);padding:20px}
.frm .frm-ttl{font-size:1rem;font-weight:700;margin-bottom:18px;letter-spacing:-.3px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:.75rem;font-weight:600;color:var(--txt2);margin-bottom:5px}
.fg input[type=date],.fg input[type=number]{width:100%;padding:11px 14px;border:1.5px solid var(--brd);border-radius:var(--rads);font-size:.9rem;font-family:var(--fnt);color:var(--txt);background:var(--srf2);transition:border-color .2s;outline:none;-webkit-appearance:none}
.fg input:focus{border-color:var(--prm)}
.qrw{display:flex;align-items:center;gap:10px;background:var(--srf2);border:1px solid var(--brd);border-radius:var(--rads);padding:8px 12px}
.qrw label{white-space:nowrap;margin-bottom:0;font-size:.85rem;color:var(--txt)}
.qrw .qi{display:flex;align-items:center;gap:5px}
.qrw .qi button{width:38px;height:38px;border:1.5px solid var(--brd);border-radius:10px;background:var(--srf);color:var(--txt2);font-size:1.15rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:var(--fnt);line-height:1;-webkit-appearance:none}
.qrw .qi button:active{background:var(--prmglow);border-color:var(--prm);color:var(--prm)}
.qrw .qi input{width:56px;text-align:center;padding:8px 4px;font-weight:600}
.pinfo{font-size:.68rem;color:var(--txt3);margin-top:3px}

/* Live Calc */
.lc{background:var(--prmglow);border:1px solid var(--brd);border-radius:var(--rads);padding:14px;margin:16px 0;display:grid;grid-template-columns:1fr 1fr;gap:6px 16px}
.lc .li{font-size:.8rem;color:var(--txt2)}
.lc .li strong{color:var(--txt);font-weight:700}
.lc .lp{grid-column:1/-1;font-size:1.1rem;font-weight:700;text-align:center;padding-top:6px;border-top:1px solid var(--brd);margin-top:2px}

/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border:none;border-radius:var(--rads);font-size:.88rem;font-weight:600;font-family:var(--fnt);cursor:pointer;transition:all .15s;-webkit-appearance:none}
.btn-p{background:linear-gradient(135deg,var(--prm),var(--prm2));color:#fff}
.btn-p:active{opacity:.9;transform:scale(.97)}
.btn-s{background:linear-gradient(135deg,var(--scs),#0b9b6b);color:#fff}
.btn-s:active{opacity:.9;transform:scale(.97)}
.btn-d{background:var(--scl);color:#fff}
.btn-d:active{opacity:.9}
.btn-o{background:transparent;border:1.5px solid var(--brd);color:var(--txt2)}
.btn-o:active{border-color:var(--prm);color:var(--prm);background:var(--prmglow)}
.btn-full{width:100%}

/* Empty */
.emp{text-align:center;padding:40px 20px;color:var(--txt3)}
.emp .ei{width:48px;height:48px;margin:0 auto 12px;border-radius:50%;background:var(--srf2);display:flex;align-items:center;justify-content:center;font-size:1.3rem}
.emp h4{font-size:.95rem;font-weight:600;color:var(--txt2);margin-bottom:3px}
.emp p{font-size:.8rem}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.25);z-index:100;display:none;align-items:flex-end;justify-content:center;animation:fadeIn .2s}
.modal-overlay.show{display:flex}
.modal{background:var(--srf);border-radius:var(--rad) var(--rad) 0 0;width:100%;max-width:500px;box-shadow:0 -4px 24px rgba(0,0,0,.08);padding:24px 20px 28px;animation:slideUp .25s ease}
.modal h3{font-size:1rem;font-weight:700;margin-bottom:18px}
.modal .fg{margin-bottom:12px}
.modal .modal-acts{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--brd)}
.modal .modal-acts .btn{padding:10px 18px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Toast */
.toast-container{position:fixed;top:calc(var(--hd) + 8px);left:12px;right:12px;z-index:200;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--srf);border:1px solid var(--brd);border-radius:var(--rads);padding:12px 16px;box-shadow:var(--shwl);display:flex;align-items:center;gap:10px;font-size:.82rem;font-weight:500;animation:slideT .25s ease;pointer-events:all;border-left:3px solid var(--prm)}
.toast.scs{border-left-color:var(--scs)}
.toast.err{border-left-color:var(--scl)}
.toast .tc{background:none;border:none;cursor:pointer;color:var(--txt3);font-size:1.1rem;margin-left:auto;padding:0 4px;font-family:var(--fnt)}
@keyframes slideT{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Sync Status Dot */
.syncd{display:inline-block;width:7px;height:7px;border-radius:50%;margin-left:4px}
.syncd.ok{background:var(--scs)}
.syncd.off{background:var(--txt3)}
.syncd.sg{background:var(--prm);animation:pls 1s ease infinite}
.syncd.er{background:var(--scl)}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.3}}

/* Touch feedback */
*{-webkit-tap-highlight-color:transparent}
button,input,select,textarea{font-family:var(--fnt)}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
</style>
</head>
<body data-theme="light">

<!-- Header -->
<header class="hdr">
  <div class="hdr-l">
    <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C12 2 5 11 5 15c0 3.9 3.1 7 7 7s7-3.1 7-7c0-4-7-13-7-13z"/><path d="M12 10v4"/><circle cx="12" cy="6" r=".7" fill="currentColor"/></svg></div>
    <div><h1>Damacana Takip</h1><span class="hdr-date" id="hdrDate"></span></div>
  </div>
  <div class="hdr-r">
    <button id="syncHdrBtn" onclick="App.showSyncModal()" title="Senkron">&#9729;<span class="syncd off" id="syncDot"></span></button>
    <button onclick="App.toggleTheme()" title="Tema">&#9790;</button>
  </div>
</header>

<!-- Pages -->
<main id="content">

<!-- Dashboard -->
<div class="pg act" id="pg-dash">
  <div class="crds" id="dashCrds"></div>
  <div class="tbl"><div class="tbl-hdr"><h3>Son Satışlar</h3></div><div id="dashList"></div></div>
</div>

<!-- Add -->
<div class="pg" id="pg-add">
  <div class="frm">
    <div class="frm-ttl">&#x1F4CB; Yeni Satış</div>
    <div class="fg">
      <label>Tarih</label>
      <input type="date" id="saleDate">
    </div>
    <div class="fg">
      <label>Nazlı</label>
      <div class="qrw">
        <div class="qi">
          <button onclick="adjQty('n',-1)">−</button>
          <input type="number" id="qtyN" value="0" min="0">
          <button onclick="adjQty('n',1)">+</button>
        </div>
      </div>
      <div class="pinfo">Alış 70₺ → Satış 130₺ (Kâr 60₺)</div>
    </div>
    <div class="fg">
      <label>Kaltun</label>
      <div class="qrw">
        <div class="qi">
          <button onclick="adjQty('k',-1)">−</button>
          <input type="number" id="qtyK" value="0" min="0">
          <button onclick="adjQty('k',1)">+</button>
        </div>
      </div>
      <div class="pinfo">Alış 100₺ → Satış 150₺ (Kâr 50₺)</div>
    </div>
    <div class="lc" id="lc">
      <span class="li">Nazlı: <strong id="lcn">0</strong></span>
      <span class="li">Kaltun: <strong id="lck">0</strong></span>
      <span class="li">Ciro: <strong id="lcr">0₺</strong></span>
      <span class="li">Maliyet: <strong id="lcm">0₺</strong></span>
      <span class="lp">Kâr: <span id="lk">0₺</span></span>
    </div>
    <button class="btn btn-s btn-full" onclick="saveSale()">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Satışı Kaydet
    </button>
  </div>
</div>

<!-- Monthly -->
<div class="pg" id="pg-monthly">
  <div class="pg-hdr">
    <h2 id="mTitle">Aylık</h2>
    <div class="ctrls">
      <button onclick="chMonth(-1)">&#9664;</button>
      <button onclick="chMonth(1)">&#9654;</button>
    </div>
  </div>
  <div class="tbl"><div id="mTable"></div></div>
</div>

<!-- Yearly -->
<div class="pg" id="pg-yearly">
  <div class="pg-hdr">
    <h2 id="yTitle">Yıllık</h2>
    <div class="ctrls">
      <button onclick="chYear(-1)">&#9664;</button>
      <button onclick="chYear(1)">&#9654;</button>
    </div>
  </div>
  <div class="tbl"><div id="yTable"></div></div>
  <div class="chrt"><h3>Aylık Kâr</h3><div class="chrt-b" id="yChart"></div></div>
</div>

<!-- History -->
<div class="pg" id="pg-history">
  <div class="pg-hdr">
    <h2>Geçmiş</h2>
    <div class="ctrls">
      <button onclick="App.sa=!App.sa;App.rndH();App.hstBtn()" id="hstBtn">&#9650; Yeni</button>
    </div>
  </div>
  <div class="tbl"><div id="hstTable"></div></div>
</div>

</main>

<!-- Bottom Nav -->
<nav class="bnav" id="bnav">
  <a class="act" data-v="dash" onclick="swV('dash')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg>
    <span>Ana Sayfa</span>
  </a>
  <a data-v="add" onclick="swV('add')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="12" y1="8" x2="12" y2="16"/></svg>
    <span>Ekle</span>
  </a>
  <a data-v="monthly" onclick="swV('monthly')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
    <span>Aylık</span>
  </a>
  <a data-v="yearly" onclick="swV('yearly')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="13" width="4" height="7" rx="1"/><rect x="10" y="9" width="4" height="11" rx="1"/><rect x="16" y="5" width="4" height="15" rx="1"/></svg>
    <span>Yıllık</span>
  </a>
  <a data-v="history" onclick="swV('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
    <span>Geçmiş</span>
  </a>
</nav>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>Düzenle</h3>
    <div class="fg"><label>Tarih</label><input type="date" id="edtDate" readonly style="opacity:.7"></div>
    <div class="fg"><label>Nazlı</label><input type="number" id="edtN" min="0"></div>
    <div class="fg"><label>Kaltun</label><input type="number" id="edtK" min="0"></div>
    <div class="modal-acts">
      <button class="btn btn-o" onclick="clEd()">İptal</button>
      <button class="btn btn-d" onclick="cfDel()">Sil</button>
      <button class="btn btn-p" onclick="svEd()">Kaydet</button>
    </div>
  </div>
</div>

<!-- Sync Modal -->
<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h3>&#9729; Senkronizasyon</h3>
    <div class="fg">
      <label>GitHub Token</label>
      <input type="password" id="syncTok" placeholder="ghp_......" style="font-family:monospace;font-size:.8rem">
      <div style="font-size:.65rem;color:var(--txt3);margin-top:4px"><a href="https://github.com/settings/tokens" target="_blank" style="color:var(--prm)">Token oluştur</a> · repo izni</div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="btn btn-p" onclick="App.syn.push()" style="flex:1;padding:11px">&#9729; Yükle</button>
      <button class="btn btn-o" onclick="App.syn.pull()" style="flex:1;padding:11px">&#9729; İndir</button>
    </div>
    <div id="syncSt" style="font-size:.75rem;color:var(--txt3);text-align:center;padding:6px;border-radius:8px;background:var(--srf2)"></div>
    <div class="modal-acts"><button class="btn btn-o" onclick="clSync()">Kapat</button></div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="tstC"></div>

<script>
const App = {
  prd: { n: { al:70, sa:130, nm:'Nazlı' }, k: { al:100, sa:150, nm:'Kaltun' } },
  sls: {}, cv: 'dash', md: new Date(), yd: new Date(), sa: false, ed: null,
  AY: ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'],
  _sg: false,

  syn: {
    tok: '', sha: null, repo: 'toprakefeguvenc/damacana-takip', path: 'data.json',
    ldTok() { this.tok = localStorage.getItem('st')||''; return this.tok },
    svTok(t) { this.tok = t; localStorage.setItem('st', t) },
    gTok() { return document.getElementById('syncTok').value.trim() || this.tok },
    async push() {
      const t = this.gTok(); if (!t) { tst('Token girin','err'); return }
      this.svTok(t); App.syncSt('Gönderiliyor...'); dot('sg')
      const data = btoa(unescape(encodeURIComponent(JSON.stringify(App.sls,null,2))))
      try {
        let sha = null
        const gr = await fetch('https://api.github.com/repos/'+this.repo+'/contents/'+this.path,{headers:{Authorization:'Bearer '+t}})
        if (gr.ok) { const gj = await gr.json(); sha = gj.sha }
        const body = {message:'Sync '+new Date().toISOString().slice(0,10),content:data}; if (sha) body.sha = sha
        const r = await fetch('https://api.github.com/repos/'+this.repo+'/contents/'+this.path,{method:'PUT',headers:{Authorization:'Bearer '+t,'Content-Type':'application/json'},body:JSON.stringify(body)})
        const j = await r.json()
        if (r.ok) { this.sha = j.content.sha; App.syncSt('✔ '+new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})); dot('ok'); tst('Yüklendi','scs') }
        else { App.syncSt(j.message||'Hata'); dot('er'); tst('Hata: '+(j.message||r.status),'err') }
      } catch(e) { App.syncSt('Bağlantı hatası'); dot('er'); tst('Bağlantı hatası','err') }
    },
    async pull() {
      const t = this.gTok(); if (!t) { tst('Token girin','err'); return }
      this.svTok(t); App.syncSt('İndiriliyor...'); dot('sg')
      try {
        const r = await fetch('https://api.github.com/repos/'+this.repo+'/contents/'+this.path,{headers:{Authorization:'Bearer '+t}})
        if (r.status===404) { App.syncSt('Bulut boş, önce yükleyin'); dot('off'); tst('Bulut boş','err'); return }
        if (!r.ok) { App.syncSt('Hata '+r.status); dot('er'); tst('İndirme hatası','err'); return }
        const j = await r.json(); this.sha = j.sha
        const raw = decodeURIComponent(escape(atob(j.content)))
        App._sg = true; App.sls = JSON.parse(raw); App.sv(); App._sg = false; App.rndAll()
        App.syncSt('✔ '+new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})); dot('ok'); tst('Güncellendi','scs')
      } catch(e) { App.syncSt('Bağlantı hatası'); dot('er'); tst('İndirme hatası','err') }
    }
  },

  init() {
    this.ldThm(); this.ld()
    const n = new Date()
    document.getElementById('hdrDate').textContent = n.toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'})
    document.getElementById('saleDate').value = n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0')
    document.getElementById('saleDate').oninput = () => this.lcUpd()
    document.getElementById('qtyN').oninput = () => this.lcUpd()
    document.getElementById('qtyK').oninput = () => this.lcUpd()
    this.lcUpd(); this.rndAll()
    this.syn.ldTok(); if (this.syn.tok) setTimeout(() => this.syn.pull(), 600)
    document.getElementById('syncModal').onclick = e => { if (e.target.id==='syncModal') clSync() }
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{})
  },

  ldThm() { const s = localStorage.getItem('th')||'light'; document.body.setAttribute('data-theme',s); document.getElementById('themeMeta').content = s==='dark'?'#0b1120':'#0e7c8a' },
  toggleTheme() { const n = document.body.getAttribute('data-theme')==='dark'?'light':'dark'; document.body.setAttribute('data-theme',n); localStorage.setItem('th',n); document.getElementById('themeMeta').content = n==='dark'?'#0b1120':'#0e7c8a' },

  ld() {
    try {
      let d = localStorage.getItem('ds')
      if (!d) { const old = localStorage.getItem('damacanaSales'); if (old) { d = old; localStorage.setItem('ds', old); localStorage.removeItem('damacanaSales') } }
      this.sls = d ? JSON.parse(d) : {}
      let changed = false
      for (const [k,v] of Object.entries(this.sls)) { if (v.nazli!==undefined) { this.sls[k]={n:v.nazli||0,k:v.kaltun||0}; changed=true } }
      if (changed) localStorage.setItem('ds', JSON.stringify(this.sls))
    } catch(e) { this.sls = {} }
  },
  sv() { try { localStorage.setItem('ds', JSON.stringify(this.sls)) } catch(e) { tst('Kayıt hatası','err') } if (!this._sg&&(this.syn.tok||localStorage.getItem('st'))) setTimeout(()=>this.syn.push(),400) },

  cd(d) { const s=this.sls[d]; if(!s) return {n:0,k:0,t:0,r:0,c:0,p:0}; const n=(s.n||s.nazli||0),k=(s.k||s.kaltun||0); return {n,k,t:n+k,r:n*this.prd.n.sa+k*this.prd.k.sa,c:n*this.prd.n.al+k*this.prd.k.al,p:n*this.prd.n.sa+k*this.prd.k.sa-n*this.prd.n.al-k*this.prd.k.al} },
  cm(y,m) { let r={n:0,k:0,t:0,r:0,c:0,p:0}; const ds=new Date(y,m,0).getDate(); for(let d=1;d<=ds;d++){const c=this.cd(y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0')); r.n+=c.n;r.k+=c.k;r.t+=c.t;r.r+=c.r;r.c+=c.c;r.p+=c.p} return r },
  cy(y) { let r={n:0,k:0,t:0,r:0,c:0,p:0}; for(let m=1;m<=12;m++){const c=this.cm(y,m); r.n+=c.n;r.k+=c.k;r.t+=c.t;r.r+=c.r;r.c+=c.c;r.p+=c.p} return r },
  gd(y,m) { return new Date(y,m,0).getDate() },

  swV(v) {
    this.cv=v; const names={dash:'Ana Sayfa',add:'Satış Ekle',monthly:'Aylık',yearly:'Yıllık',history:'Geçmiş'}
    document.querySelectorAll('.pg').forEach(p=>p.classList.remove('act'))
    const el = document.getElementById('pg-'+v); if (el) el.classList.add('act')
    document.querySelectorAll('.bnav a').forEach(a=>a.classList.toggle('act',a.dataset.v===v))
    if (v==='dash') this.rndDash()
    else if (v==='monthly') this.rndM()
    else if (v==='yearly') this.rndY()
    else if (v==='history') this.rndH()
  },

  rndAll() { this.rndDash(); this.rndM(); this.rndY(); this.rndH() },

  rndDash() {
    const n=new Date(), t=this.cd(n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0'))
    const m=this.cm(n.getFullYear(),n.getMonth()+1), y=this.cy(n.getFullYear())
    document.getElementById('dashCrds').innerHTML =
      '<div class="crd"><div class="crd-top"><div class="crd-icn" style="background:var(--prmglow);color:var(--prm)">📅</div><span class="crd-lbl">Bugün</span></div><div class="crd-val">'+fmt(t.t)+'</div><div class="crd-sub">Nazlı '+t.n+' · Kaltun '+t.k+' · Ciro '+fm(t.r)+'</div></div>'+
      '<div class="crd"><div class="crd-top"><div class="crd-icn" style="background:var(--prmglow);color:var(--prm)">📊</div><span class="crd-lbl">Bu Ay ('+this.AY[n.getMonth()]+')</span></div><div class="crd-val">'+fmt(m.t)+'</div><div class="crd-sub">Nazlı '+m.n+' · Kaltun '+m.k+' · Ciro '+fm(m.r)+'</div></div>'+
      '<div class="crd scs"><div class="crd-top"><div class="crd-icn">💰</div><span class="crd-lbl">Bu Yıl ('+n.getFullYear()+')</span></div><div class="crd-val">'+fm(y.p)+'</div><div class="crd-sub">'+y.t+' adet · Ciro '+fm(y.r)+'</div></div>'
    const es = Object.entries(this.sls).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,8)
    if (!es.length) { document.getElementById('dashList').innerHTML='<div class="emp"><div class="ei">📋</div><h4>Kayıt yok</h4><p>Satış eklemek için alt menüden "Ekle"ye dokunun.</p></div>'; return }
    let h='<div class="tbl-scrl"><table><thead><tr><th>Tarih</th><th>Nazlı</th><th>Kaltun</th><th class="tar">Kâr</th></tr></thead><tbody>'
    for (const [d,s] of es) { const c = this.cd(d); h+='<tr onclick="opEd(\''+d+'\')"><td>'+d+'</td><td>'+c.n+'</td><td>'+c.k+'</td><td class="tar t-scs">+'+fm(c.p)+'</td></tr>' }
    h+='</tbody></table></div>'; document.getElementById('dashList').innerHTML=h
  },

  lcUpd() {
    const n=parseInt(document.getElementById('qtyN').value)||0, k=parseInt(document.getElementById('qtyK').value)||0
    const r=n*this.prd.n.sa+k*this.prd.k.sa, c=n*this.prd.n.al+k*this.prd.k.al, p=r-c
    document.getElementById('lcn').textContent=n; document.getElementById('lck').textContent=k
    document.getElementById('lcr').textContent=fm(r); document.getElementById('lcm').textContent=fm(c)
    document.getElementById('lk').textContent=(p>=0?'+':'')+fm(p); document.getElementById('lk').style.color=p>=0?'var(--scs)':'var(--scl)'
  },

  svSl() {
    const d=document.getElementById('saleDate').value; if(!d){tst('Tarih seçin','err');return}
    const n=parseInt(document.getElementById('qtyN').value)||0, k=parseInt(document.getElementById('qtyK').value)||0
    if(!n&&!k){tst('Adet girin','err');return}
    if(this.sls[d]&&!confirm(d+' için kayıt var. Güncellensin?')) return
    this.sls[d]={n,k}; this.sv(); this.rndAll()
    document.getElementById('qtyN').value='0'; document.getElementById('qtyK').value='0'; this.lcUpd()
    tst('✔ '+d+' kaydedildi','scs')
  },

  rndM() {
    const y=this.md.getFullYear(), m=this.md.getMonth()+1
    document.getElementById('mTitle').textContent=this.AY[m-1]+' '+y
    const ds=this.gd(y,m); let h='<div class="tbl-scrl"><table><thead><tr><th>Gün</th><th>N</th><th>K</th><th>Top</th><th class="tar">Ciro</th><th class="tar">Kâr</th></tr></thead><tbody>'
    let tot={n:0,k:0,t:0,r:0,p:0}
    for(let d=1;d<=ds;d++){const key=y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');const c=this.cd(key);tot.n+=c.n;tot.k+=c.k;tot.t+=c.t;tot.r+=c.r;tot.p+=c.p
      h+=c.t?'<tr onclick="opEd(\''+key+'\')"><td>'+String(d).padStart(2,'0')+'</td><td>'+c.n+'</td><td>'+c.k+'</td><td>'+c.t+'</td><td class="tar">'+fm(c.r)+'</td><td class="tar t-scs">+'+fm(c.p)+'</td></tr>':'<tr><td class="t-mut">'+String(d).padStart(2,'0')+'</td><td class="t-mut">-</td><td class="t-mut">-</td><td class="t-mut">-</td><td class="tar t-mut">-</td><td class="tar t-mut">-</td></tr>'
    }
    h+='<tr style="font-weight:700"><td>Toplam</td><td>'+tot.n+'</td><td>'+tot.k+'</td><td>'+tot.t+'</td><td class="tar">'+fm(tot.r)+'</td><td class="tar t-scs">+'+fm(tot.p)+'</td></tr>'
    h+='</tbody></table></div>'; document.getElementById('mTable').innerHTML=h
  },

  rndY() {
    const y=this.yd.getFullYear()
    document.getElementById('yTitle').textContent=y
    let h='<div class="tbl-scrl"><table><thead><tr><th>Ay</th><th>N</th><th>K</th><th>Top</th><th class="tar">Ciro</th><th class="tar">Kâr</th></tr></thead><tbody>'
    let tot={n:0,k:0,t:0,r:0,p:0}; const ps=[]
    for(let m=1;m<=12;m++){const c=this.cm(y,m);tot.n+=c.n;tot.k+=c.k;tot.t+=c.t;tot.r+=c.r;tot.p+=c.p;ps.push(c.p)
      h+=c.t?'<tr><td>'+this.AY[m-1]+'</td><td>'+c.n+'</td><td>'+c.k+'</td><td>'+c.t+'</td><td class="tar">'+fm(c.r)+'</td><td class="tar t-scs">+'+fm(c.p)+'</td></tr>':'<tr><td class="t-mut">'+this.AY[m-1]+'</td><td class="t-mut">-</td><td class="t-mut">-</td><td class="t-mut">-</td><td class="tar t-mut">-</td><td class="tar t-mut">-</td></tr>'
    }
    h+='<tr style="font-weight:700"><td>Toplam</td><td>'+tot.n+'</td><td>'+tot.k+'</td><td>'+tot.t+'</td><td class="tar">'+fm(tot.r)+'</td><td class="tar t-scs">+'+fm(tot.p)+'</td></tr>'
    h+='</tbody></table></div>'; document.getElementById('yTable').innerHTML=h
    const mx=Math.max(...ps,1); let ch=''
    for(let m=0;m<12;m++){const p=ps[m], pct=p>0?Math.max((p/mx)*100,6):6;ch+='<div class="bar'+(p===0?' emp':'')+'" style="height:'+pct+'%"><span class="bv">'+(p>0?fm(p):'')+'</span><span class="bl">'+this.AY[m].slice(0,3)+'</span></div>'}
    document.getElementById('yChart').innerHTML=ch
  },

  rndH() {
    const es=Object.entries(this.sls); if(!es.length){document.getElementById('hstTable').innerHTML='<div class="emp"><div class="ei">📋</div><h4>Kayıt yok</h4></div>';return}
    es.sort((a,b)=>this.sa?a[0].localeCompare(b[0]):b[0].localeCompare(a[0]))
    let h='<div class="tbl-scrl"><table><thead><tr><th>Tarih</th><th>N</th><th>K</th><th>Top</th><th class="tar">Ciro</th><th class="tar">Kâr</th><th class="tar" style="width:70px"></th></tr></thead><tbody>'
    for(const[d,s]of es){const c=this.cd(d);h+='<tr><td>'+d+'</td><td>'+c.n+'</td><td>'+c.k+'</td><td>'+c.t+'</td><td class="tar">'+fm(c.r)+'</td><td class="tar t-scs">+'+fm(c.p)+'</td><td class="tar"><div class="acts"><button onclick="opEd(\''+d+'\')">&#9998;</button><button onclick="dlSl(\''+d+'\')" style="color:var(--scl)">&#128465;</button></div></td></tr>'}
    h+='</tbody></table></div>'; document.getElementById('hstTable').innerHTML=h; this.hstBtn()
  },

  hstBtn() { document.getElementById('hstBtn').innerHTML = (this.sa?'&#9650; Eski':'&#9650; Yeni')+'→'+(this.sa?'Yeni':'Eski') },

  opEd(d) { this.ed=d; const s=this.sls[d]; if(!s)return; document.getElementById('edtDate').value=d; document.getElementById('edtN').value=s.n; document.getElementById('edtK').value=s.k; document.getElementById('editModal').classList.add('show') },
  clEd() { document.getElementById('editModal').classList.remove('show'); this.ed=null },
  svEd() { const d=this.ed; if(!d)return; const n=parseInt(document.getElementById('edtN').value)||0,k=parseInt(document.getElementById('edtK').value)||0; if(!n&&!k){if(confirm('Kayıt silinsin mi?'))this.dlSlD(d);return}; this.sls[d]={n,k}; this.sv(); this.clEd(); this.rndAll(); tst('✔ Güncellendi','scs') },
  cfDel() { const d=this.ed; if(d&&confirm(d+' silinsin mi?')) this.dlSlD(d) },
  dlSlD(d) { delete this.sls[d]; this.sv(); this.clEd(); this.rndAll(); tst('🗑 Silindi','scs') },

  syncSt(m,t) { const el=document.getElementById('syncSt'); el.textContent=m; if(t==='ok')el.style.color='var(--scs)';else if(t==='er')el.style.color='var(--scl)';else el.style.color='var(--txt3)' },
  showSyncModal() { document.getElementById('syncTok').value=this.syn.ldTok(); const h=localStorage.getItem('st')?'✔ Token var, yükle/indir yapabilirsiniz':'Token girin'; this.syncSt(h); document.getElementById('syncModal').classList.add('show') }
}

function fmt(n){return Number(n).toLocaleString('tr-TR')}
function fm(n){return fmt(n)+'₺'}
function swV(v){App.swV(v)}
function adjQty(p,d){const el=document.getElementById(p==='n'?'qtyN':'qtyK'); let v=parseInt(el.value)||0; el.value=Math.max(0,v+d); App.lcUpd()}
function saveSale(){App.svSl()}
function chMonth(d){App.md.setMonth(App.md.getMonth()+d);App.rndM()}
function chYear(d){App.yd.setFullYear(App.yd.getFullYear()+d);App.rndY()}
function opEd(d){App.opEd(d)}
function dlSl(d){if(confirm(d+' silinsin mi?'))App.dlSlD(d)}
function clEd(){App.clEd()}
function svEd(){App.svEd()}
function cfDel(){App.cfDel()}
function clSync(){document.getElementById('syncModal').classList.remove('show')}

function dot(s){const e=document.getElementById('syncDot'); e.className='syncd '+s}

function tst(msg,tp){
  const c=document.getElementById('tstC'), t=document.createElement('div')
  t.className='toast'+(tp==='scs'?' scs':tp==='err'?' err':'')
  t.innerHTML='<span>'+msg+'</span><button class="tc" onclick="this.parentElement.remove()">&#10005;</button>'
  c.appendChild(t); setTimeout(()=>{if(t.parentElement)t.remove()},3500)
}

document.addEventListener('DOMContentLoaded',()=>{App.init()})
</script>
</body>
</html>
